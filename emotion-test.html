<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情感状态测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #a8c0ff, #d9c7f5);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            background: white;
            margin: 30px auto;
            padding: 35px 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .title {
            text-align: center;
            font-size: 26px;
            color: #4a4a88;
            margin-bottom: 10px;
        }

        .desc {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .question {
            margin: 20px 0;
            padding: 15px;
            border-left: 4px solid #8c96ff;
            background: #f7f8ff;
            border-radius: 10px;
        }

        .q-text {
            font-size: 16px;
            color: #333;
            margin-bottom: 10px;
        }

        .options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .options label {
            padding: 6px 10px;
            background: #eee;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .options input:checked + label {
            background: #8c96ff;
            color: white;
        }

        .submit {
            width: 100%;
            padding: 14px;
            background: #6b7aff;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            margin-top: 20px;
            cursor: pointer;
        }

        .result {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .result h2 {
            color: #4a4a88;
            margin-bottom: 15px;
        }

        .result-text {
            font-size: 16px;
            color: #555;
            line-height: 1.7;
        }

        .reset {
            margin-top: 20px;
            padding: 10px 20px;
            background: #ff9a9a;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">🌈 情感状态测试</div>
        <div class="desc">根据你的真实感受选择答案，系统将分析你的当前情绪状态～</div>

        <div id="test">
            <!-- 10道情感题目 -->
            <div class="question">
                <div class="q-text">1. 我最近感到心情轻松愉快</div>
                <div class="options">
                    <input type="radio" name="q1" value="1" id="q1-1"> <label for="q1-1">非常不同意</label>
                    <input type="radio" name="q1" value="2"> <label>不同意</label>
                    <input type="radio" name="q1" value="3"> <label>一般</label>
                    <input type="radio" name="q1" value="4"> <label>同意</label>
                    <input type="radio" name="q1" value="5"> <label>非常同意</label>
                </div>
            </div>

            <div class="question">
                <div class="q-text">2. 我容易感到焦虑或紧张</div>
                <div class="options">
                    <input type="radio" name="q2" value="1"> <label>非常不同意</label>
                    <input type="radio" name="q2" value="2"> <label>不同意</label>
                    <input type="radio" name="q2" value="3"> <label>一般</label>
                    <input type="radio" name="q2" value="4"> <label>同意</label>
                    <input type="radio" name="q2" value="5"> <label>非常同意</label>
                </div>
            </div>

            <!-- 你可以让AI补全剩下8题，或直接用我完整版 -->
            <div class="question"><div class="q-text">3. 我对未来充满希望</div><div class="options"><input type="radio" name="q3" value="1"><label>非常不同意</label><input type="radio" name="q3" value="2"><label>不同意</label><input type="radio" name="q3" value="3"><label>一般</label><input type="radio" name="q3" value="4"><label>同意</label><input type="radio" name="q3" value="5"><label>非常同意</label></div></div>
            <div class="question"><div class="q-text">4. 我经常感到疲惫无力</div><div class="options"><input type="radio" name="q4" value="1"><label>非常不同意</label><input type="radio" name="q4" value="2"><label>不同意</label><input type="radio" name="q4" value="3"><label>一般</label><input type="radio" name="q4" value="4"><label>同意</label><input type="radio" name="q4" value="5"><label>非常同意</label></div></div>
            <div class="question"><div class="q-text">5. 我能平静面对生活中的压力</div><div class="options"><input type="radio" name="q5" value="1"><label>非常不同意</label><input type="radio" name="q5" value="2"><label>不同意</label><input type="radio" name="q5" value="3"><label>一般</label><input type="radio" name="q5" value="4"><label>同意</label><input type="radio" name="q5" value="5"><label>非常同意</label></div></div>
            <div class="question"><div class="q-text">6. 我容易情绪低落</div><div class="options"><input type="radio" name="q6" value="1"><label>非常不同意</label><input type="radio" name="q6" value="2"><label>不同意</label><input type="radio" name="q6" value="3"><label>一般</label><input type="radio" name="q6" value="4"><label>同意</label><input type="radio" name="q6" value="5"><label>非常同意</label></div></div>
            <div class="question"><div class="q-text">7. 我喜欢和他人交流相处</div><div class="options"><input type="radio" name="q7" value="1"><label>非常不同意</label><input type="radio" name="q7" value="2"><label>不同意</label><input type="radio" name="q7" value="3"><label>一般</label><input type="radio" name="q7" value="4"><label>同意</label><input type="radio" name="q7" value="5"><label>非常同意</label></div></div>
            <div class="question"><div class="q-text">8. 我经常胡思乱想无法平静</div><div class="options"><input type="radio" name="q8" value="1"><label>非常不同意</label><input type="radio" name="q8" value="2"><label>不同意</label><input type="radio" name="q8" value="3"><label>一般</label><input type="radio" name="q8" value="4"><label>同意</label><input type="radio" name="q8" value="5"><label>非常同意</label></div></div>
            <div class="question"><div class="q-text">9. 我对日常活动保持兴趣</div><div class="options"><input type="radio" name="q9" value="1"><label>非常不同意</label><input type="radio" name="q9" value="2"><label>不同意</label><input type="radio" name="q9" value="3"><label>一般</label><input type="radio" name="q9" value="4"><label>同意</label><input type="radio" name="q9" value="5"><label>非常同意</label></div></div>
            <div class="question"><div class="q-text">10. 我能很好地调节自己的情绪</div><div class="options"><input type="radio" name="q10" value="1"><label>非常不同意</label><input type="radio" name="q10" value="2"><label>不同意</label><input type="radio" name="q10" value="3"><label>一般</label><input type="radio" name="q10" value="4"><label>同意</label><input type="radio" name="q10" value="5"><label>非常同意</label></div></div>

            <button class="submit" onclick="getResult()">查看结果</button>
        </div>

        <div class="result" id="result">
            <h2>你的情感状态：<span id="type"></span></h2>
            <div class="result-text" id="msg"></div>
            <button class="reset" onclick="resetTest()">重新测试</button>
        </div>
    </div>

    <script>
        function getResult() {
            let total = 0;
            for(let i=1; i<=10; i++) {
                let sel = document.querySelector('input[name="q'+i+'"]:checked');
                if(!sel) { alert("请完成所有题目"); return; }
                total += parseInt(sel.value);
            }

            let type, msg;
            if(total >= 42) {
                type = "✨ 轻松愉悦";
                msg = "你当前情绪非常积极，心态阳光，充满能量，继续保持！";
            } else if(total >= 32) {
                type = "☁️ 心态平和";
                msg = "情绪稳定，内心平静，能较好应对生活，状态不错。";
            } else if(total >= 22) {
                type = "⚠️ 轻微焦虑";
                msg = "最近有些压力和小焦虑，适当休息、放松会更好。";
            } else {
                type = "🔵 情绪低落/压力较大";
                msg = "你可能正处于疲惫状态，记得照顾自己，必要时找人倾诉哦。";
            }

            document.getElementById("type").innerText = type;
            document.getElementById("msg").innerText = msg;
            document.getElementById("test").style.display = "none";
            document.getElementById("result").style.display = "block";
        }

        function resetTest() {
            document.querySelectorAll('input[type="radio"]').forEach(i => i.checked = false);
            document.getElementById("test").style.display = "block";
            document.getElementById("result").style.display = "none";
        }
    </script>
</body>
</html>
